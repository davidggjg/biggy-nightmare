name: Build Biggy Nightmare

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable

      - name: Create export directory
        run: mkdir -v -p build/windows

      - name: Export Windows
        run: godot --headless --export-release "Windows Desktop" build/windows/biggy-nightmare.exe
        working-directory: ./project

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: biggy-nightmare-windows
          path: build/windows/
